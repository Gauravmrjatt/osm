server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    # PHP processing
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Clean URLs - remove .php extension
    location / {
        try_files $uri $uri/ $uri.php?$query_string;
    }

    # Handle /offer/id format
    location ~ ^/offer/(\d+)$ {
        rewrite ^/offer/(\d+)$ /offer.php?id=$1 last;
    }

    # Handle /admin and /admin?tab=xxx
    location ~ ^/admin(/.*)?$ {
        rewrite ^/admin(/.*)?$ /admin.php$1 last;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    location ~ /\.ht {
        deny all;
    }
    location ~ /\.git {
        deny all;
    }

    # Uploads directory
    location /uploads/ {
        alias /var/www/html/uploads/;
        autoindex off;
    }
}
